<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.calculator{
  background:#1e1e1e;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  width:320px;
}

#display{
  width:100%;
  height:60px;
  font-size:24px;
  text-align:right;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:#000;
  color:#00ff9d;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

button{
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#333;
  color:white;
  transition:0.2s;
}

button:hover{
  background:#555;
}

.operator{
  background:#ff9500;
}

.operator:hover{
  background:#ffad33;
}

.equal{
  background:#2ecc71;
  grid-column:span 2;
}

.equal:hover{
  background:#27ae60;
}

.clear{
  background:#e74c3c;
  grid-column:span 2;
}

.clear:hover{
  background:#c0392b;
}

.scientific{
  background:#444;
}

.scientific:hover{
  background:#666;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="scientific" onclick="appendValue('Math.sin(')">sin</button>
<button class="scientific" onclick="appendValue('Math.cos(')">cos</button>
<button class="scientific" onclick="appendValue('Math.tan(')">tan</button>
<button class="scientific" onclick="appendValue('Math.log10(')">log</button>
<button class="scientific" onclick="appendValue('Math.sqrt(')">√</button>

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('/')">/</button>
<button class="scientific" onclick="appendValue('Math.pow(')">xʸ</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('*')">*</button>
<button class="scientific" onclick="appendValue('Math.PI')">π</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('-')">-</button>
<button class="scientific" onclick="appendValue('Math.E')">e</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="operator" onclick="appendValue('+')">+</button>
<button onclick="appendValue('(')">(</button>
<button onclick="appendValue(')')">)</button>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

function appendValue(value){
  document.getElementById("display").value += value;
}

function clearDisplay(){
  document.getElementById("display").value = "";
}

function calculate(){
  try{
    document.getElementById("display").value =
    eval(document.getElementById("display").value);
  }
  catch{
    alert("Invalid Calculation");
  }
}

</script>

</body>
</html>
